# fly.toml app configuration file generated for pineapple-wiki on 2026-06-08T00:56:42Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pineapple-wiki'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  HOSTNAME = '0.0.0.0'
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 50
    soft_limit = 25

[checks]
  [checks.health]
    port = 3000
    type = 'http'
    interval = '30s'
    timeout = '10s'
    path = '/api/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
